name: Deploy Dashboard To Vercel

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-dashboard-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets['VERCEL_TOKEN'] }}
      VERCEL_ORG_ID: ${{ secrets['VERCEL_ORG_ID'] }}
      VERCEL_PROJECT_ID: ${{ secrets['VERCEL_PROJECT_ID'] }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate Vercel secrets
        run: |
          [ -n "$VERCEL_TOKEN" ] || (echo "Missing secret: VERCEL_TOKEN" && exit 1)
          [ -n "$VERCEL_ORG_ID" ] || (echo "Missing secret: VERCEL_ORG_ID" && exit 1)
          [ -n "$VERCEL_PROJECT_ID" ] || (echo "Missing secret: VERCEL_PROJECT_ID" && exit 1)

      - name: Pull Vercel environment
        run: npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build app via Vercel
        run: npx vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel
        run: npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
