name: Deploy Dashboard To Vercel

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-dashboard-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VC_TOKEN: ${{ secrets.VC_TOKEN }}
      VC_ORG_ID: ${{ secrets.VC_ORG_ID }}
      VC_PROJECT_ID: ${{ secrets.VC_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate deploy secrets
        run: |
          [ -n "$VC_TOKEN" ] || (echo "Missing secret: VC_TOKEN" && exit 1)
          [ -n "$VC_ORG_ID" ] || (echo "Missing secret: VC_ORG_ID" && exit 1)
          [ -n "$VC_PROJECT_ID" ] || (echo "Missing secret: VC_PROJECT_ID" && exit 1)

      - name: Pull Vercel environment
        run: npx vercel pull --yes --environment=production --token="$VC_TOKEN"
        env:
          VERCEL_ORG_ID: ${{ env.VC_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ env.VC_PROJECT_ID }}

      - name: Build app via Vercel
        run: npx vercel build --prod --token="$VC_TOKEN"
        env:
          VERCEL_ORG_ID: ${{ env.VC_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ env.VC_PROJECT_ID }}

      - name: Deploy to Vercel
        run: npx vercel deploy --prebuilt --prod --token="$VC_TOKEN"
        env:
          VERCEL_ORG_ID: ${{ env.VC_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ env.VC_PROJECT_ID }}
